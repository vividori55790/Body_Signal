name: Android Build

# 언제 실행할지 정의 (main에 push하거나 깃허브 Actions 탭에서 수동으로 실행 가능)
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 저장소에서 코드를 가져옴
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js (웹 개발 환경) 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 사용하시는 노드 버전에 맞게 수정 가능

      # 3. 필수 패키지 설치
      - name: Install Dependencies
        run: npm install

      # 4. Vite 프로젝트(React) 빌드 (웹 리소스를 dist로 생성)
      - name: Build Web App
        run: npm run build

      # 5. Java 환경 세팅 (안드로이드 빌드를 위함, Capacitor 6이상은 Java 17 권장)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 6. 웹 빌드 결과물(dist 폴더)을 안드로이드 폴더로 동기화 복사
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. 안드로이드 Debug APK 빌드
      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      # 8. 만들어진 APK 파일을 깃허브에서 다운로드 받을 수 있게 (Artifact) 업로드
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
